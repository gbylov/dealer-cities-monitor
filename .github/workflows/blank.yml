name: Run dealer monitor

on:
  workflow_dispatch:
  schedule:
    - cron: '0 7,19 * * *'

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 pandas openpyxl playwright
          playwright install chromium
          playwright install-deps chromium

      - name: Debug Telegram
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          echo "TOKEN exists: ${{ secrets.TELEGRAM_TOKEN != '' }}"
          echo "CHAT_ID exists: ${{ secrets.TELEGRAM_CHAT_ID != '' }}"
          echo "TOKEN starts with: ${TELEGRAM_TOKEN:0:5}"
          echo "TOKEN length: ${#TELEGRAM_TOKEN}"
          echo "CHAT_ID=$TELEGRAM_CHAT_ID"

      - name: Run script
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python dealer_cities_monitor.py
