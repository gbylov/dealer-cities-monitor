name: Run dealer monitor

on:
  workflow_dispatch:        # ручной запуск
  schedule:
    - cron: '0 7,19 * * *'  # 2 раза в день (07:00 и 19:00 UTC ≈ МСК+3)

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 pandas openpyxl

      # 🔍 Отладка (можно потом удалить)
           - name: Debug env
        env:
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        run: |
          echo "EMAIL_FROM exists: ${{ secrets.EMAIL_FROM != '' }}"
          echo "EMAIL_PASSWORD exists: ${{ secrets.EMAIL_PASSWORD != '' }}"

      - name: Run script
        env:
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
        run: python dealer_cities_monitor.py
